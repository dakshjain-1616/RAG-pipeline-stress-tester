# RAG Pipeline Stress Tester Configuration

endpoint:
  url: "http://localhost:8000/query"
  method: "POST"
  timeout: 30
  headers:
    Content-Type: "application/json"

load:
  concurrency: [1, 5, 10, 25, 50]
  ramp_mode: true
  duration_mode: false
  duration_seconds: 60
  rate_limit: 100
  requests_per_second: 10

retry:
  max_retries: 3
  backoff_factor: 2
  initial_delay: 1.0
  max_delay: 10.0

evaluation:
  hallucination_threshold: 0.5
  refusal_keywords: ["I cannot", "I don't know", "Unable to", "Not enough information"]
  latency_percentiles: [50, 95, 99]

reporter:
  output_dir: "./reports"
  json_report: true
  html_report: true
  include_recommendations: true

query_bank:
  directory: "./query_bank"
  files:
    - "out_of_scope.txt"
    - "ambiguous.txt"
    - "multilingual.txt"
    - "adversarial.txt"
    - "temporal.txt"
    - "negation.txt"
    - "compound.txt"