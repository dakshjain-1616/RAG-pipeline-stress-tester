# RAG Pipeline Stress Tester Configuration

endpoint:
  base_url: "http://localhost:8000"
  query_path: "/query"
  timeout_seconds: 30

load:
  concurrency_levels: [1, 5, 10, 25, 50]
  ramp_mode: false
  duration_seconds: 60
  rate_limit_per_second: 100

retry:
  max_attempts: 3
  exponential_backoff: true
  base_delay_seconds: 1.0

evaluation:
  hallucination_threshold: 0.5
  refusal_keywords: ["I cannot", "I don't know", "Unable to", "Not enough information"]

reporter:
  output_dir: "./reports"
  json_filename: "stress_test_results.json"
  html_filename: "stress_test_report.html"

query_bank:
  directory: "./query_bank"
