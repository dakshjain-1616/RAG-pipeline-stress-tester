<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420">
<defs>
  <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0f0a00"/>
    <stop offset="100%" stop-color="#1a0800"/>
  </linearGradient>
  <linearGradient id="hdr1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#f97316"/>
    <stop offset="100%" stop-color="#ef4444"/>
  </linearGradient>
  <linearGradient id="score1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ef4444"/>
    <stop offset="33%" stop-color="#f97316"/>
    <stop offset="66%" stop-color="#eab308"/>
    <stop offset="100%" stop-color="#22c55e"/>
  </linearGradient>
  <marker id="arr1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
  </marker>
  <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- BG -->
<rect width="860" height="420" rx="18" fill="url(#bg1)"/>
